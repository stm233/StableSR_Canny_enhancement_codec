# CFW stage with HQ Canny encoder features concat into fusion (LQ + Canny + dec).
# Train AFTER diffusion SR ckpt; generate CFW data via scripts/generate_vqgan_data.py (see README).
model:
  base_learning_rate: 5.0e-5
  target: ldm.models.autoencoder.AutoencoderKLResi
  params:
    ckpt_path: checkpoints/vqgan_cfw_00011.ckpt
    controlnet_ckpt_path: logs/2026-06-02T01-01-09_stablesr_cn_canny/checkpoints/epoch=000020.ckpt
    monitor: "val/rec_loss"
    embed_dim: 4
    fusion_w: 1.0
    freeze_dec: true
    use_canny_cfw: true
    synthesis_data: false
    lossconfig:
      target: ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 501
        kl_weight: 0
        disc_weight: 0.025
        disc_factor: 1.0

    ddconfig:
      double_z: true
      z_channels: 4
      resolution: 512
      in_channels: 3
      out_ch: 3
      ch: 128
      ch_mult:
      - 1
      - 2
      - 4
      - 4
      num_res_blocks: 2
      attn_resolutions: []
      dropout: 0.0

    image_key: 'gt'
    canny_controlnet_stage_config:
      target: ldm.modules.controlnet_cldm.ControlNet
      params:
        image_size: 32
        in_channels: 4
        hint_channels: 3
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        use_checkpoint: False
        legacy: False

data:
  target: main.DataModuleFromConfig
  params:
    batch_size: 1
    num_workers: 6
    wrap: true
    train:
      target: basicsr.data.single_image_dataset.SingleImageNPDataset
      params:
        gt_path: ["/data/Dataset/CFW_trainingdata_cn"]
        io_backend:
          type: disk
    validation:
      target: basicsr.data.single_image_dataset.SingleImageNPDataset
      params:
        gt_path: ["/data/Dataset/CFW_trainingdata_cn"]
        io_backend:
          type: disk

lightning:
  modelcheckpoint:
    params:
      every_n_train_steps: 1500
  callbacks:
    image_logger:
      target: main.ImageLogger
      params:
        batch_frequency: 1500
        max_images: 4
        increase_log_steps: false

  trainer:
    benchmark: true
    max_epochs: 1000
    max_steps: 800000
    accumulate_grad_batches: 8
